server:
  port: 8080

spring:
  application:
    name: auto-diagram-crawler
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/auto_diagram?useSSL=true&serverTimezone=Asia/Shanghai
    username: 2aKGCxWVfqofg2r.root
    password: d76hxk8M1VLUQstM
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.exportbot.crawler.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: CrawlerScheduler
      org.quartz.threadPool.threadCount: 2
  profiles:
    active: dev
crawler:
  server:
    port: 3000
    host: 127.0.0.1
  browser:
    headless: false
    slowMo: 50
    timeout: 30000
    downloadDir: ./data/downloads
  auth:
    storePath: ./data/auth.json
  workflow:
    file: ./config/workflows/example-export.yaml
  schedule:
    enabled: false
    cron: "0 9 * * 1"
  delivery:
    - type: aliyun-oss
      enabled: ${OSS_ENABLED:true}
      options:
        region: ${OSS_REGION:cn-beijing}
        accessKeyId: ${OSS_ACCESS_KEY_ID:}
        accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
        bucket: ${OSS_BUCKET:}
        prefix: ${OSS_PREFIX:exports/{{date}}/}
    - type: smtp
      enabled: ${SMTP_ENABLED:true}
      options:
        from: ${SMTP_FROM:}
        host: ${SMTP_HOST:smtp.163.com}
        port: ${SMTP_PORT:465}
        user: ${SMTP_USER:}
        pass: ${SMTP_PASS:}
        subject: ${SMTP_SUBJECT:"ProcessOn 图片自动导出通知"}