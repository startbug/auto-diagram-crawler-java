server:
  port: 8080

spring:
  application:
    name: auto-diagram-crawler
  main:
    web-application-type: servlet
  datasource:
    url:
    username:
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: CrawlerScheduler
      org.quartz.threadPool.threadCount: 2
  profiles:
    active: dev
crawler:
  server:
    port: 3000
    host: 127.0.0.1
  browser:
    headless: false
    slowMo: 50
    timeout: 30000
    downloadDir: ./data/downloads
  auth:
    storePath: ./data/auth.json
  workflow:
    file: ./config/workflows/example-export.yaml
  schedule:
    enabled: false
    cron: "0 9 * * 1"
  delivery:
    - type: aliyun-oss
      enabled: true
      options:
        region:
        accessKeyId:
        accessKeySecret:
        bucket:
        prefix: exports/{{date}}/

